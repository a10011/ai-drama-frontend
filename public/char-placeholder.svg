<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#162238"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)" rx="12"/>
  <!-- 人物轮廓 -->
  <circle cx="200" cy="180" r="55" fill="none" stroke="#40E0E9" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="180" r="40" fill="none" stroke="#40E0E9" stroke-width="1" opacity="0.3"/>
  <!-- 身体 -->
  <path d="M140 250 Q140 230 200 230 Q260 230 260 250 L280 400 L120 400 Z" fill="none" stroke="#40E0E9" stroke-width="2" opacity="0.4"/>
  <!-- 加载动画圈 -->
  <circle cx="200" cy="180" r="70" fill="none" stroke="#40E0E9" stroke-width="2" stroke-dasharray="100 340" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 200 180" to="360 200 180" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- 文字 -->
  <text x="200" y="430" text-anchor="middle" fill="#40E0E9" font-size="14" font-family="sans-serif" opacity="0.8">正在生成角色形象</text>
  <text x="200" y="455" text-anchor="middle" fill="#40E0E9" font-size="11" font-family="sans-serif" opacity="0.4">AI 绘制中...</text>
  <!-- 底部脉冲 -->
  <circle cx="200" cy="500" r="4" fill="#40E0E9" opacity="0.6">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="500" r="4" fill="#40E0E9" opacity="0.4">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;3;5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="500" r="4" fill="#40E0E9" opacity="0.4">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
